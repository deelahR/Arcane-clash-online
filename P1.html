<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flame Grid Demo</title>
  <style>
    :root {
      --bg: #171512;
      --panel: #24201a;
      --line: #3f372d;
      --text: #fff4dc;
      --muted: #b7a98f;
      --dot: #766a57;
      --flame: #ff6a2a;
      --flame-bright: #ffd166;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(520px, calc(100vw - 24px));
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.28);
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0;
    }

    p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.35;
    }

    button {
      min-width: 68px;
      height: 34px;
      border: 1px solid #5b5041;
      border-radius: 8px;
      background: #191714;
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    .grid-wrap {
      position: relative;
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: 10px;
      background:
        radial-gradient(circle at center, rgba(255, 106, 42, 0.09), transparent 58%),
        #1b1814;
      touch-action: none;
      overflow: hidden;
    }

    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .path {
      fill: none;
      stroke: var(--flame);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 9px rgba(255, 106, 42, 0.75));
    }

    .live {
      fill: none;
      stroke: rgba(255, 209, 102, 0.62);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 6 10;
    }

    .dot {
      position: absolute;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 2px solid #8f8068;
      border-radius: 50%;
      background: #2d281f;
      color: var(--muted);
      font-weight: 800;
      transform: translate(-50%, -50%);
    }

    .dot.active {
      border-color: var(--flame-bright);
      background: var(--flame);
      color: #21160e;
      box-shadow: 0 0 20px rgba(255, 106, 42, 0.72);
    }

    .status {
      min-height: 72px;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #191714;
    }

    .sequence {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .result {
      margin-top: 6px;
      font-size: 1.25rem;
      font-weight: 900;
    }

    .result.success {
      color: var(--flame-bright);
      text-shadow: 0 0 16px rgba(255, 106, 42, 0.86);
    }

    .result.fail {
      color: #d2c3a9;
    }

  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Apprentice Flame Grid</h1>
        <p>Draw the Flame loop using 5, 7, 2, and 9.</p>
      </div>
      <button id="clear" type="button">Clear</button>
    </header>

    <section class="grid-wrap" id="grid" aria-label="3 by 3 spell drawing grid">
      <svg viewBox="0 0 300 300" aria-hidden="true">
        <polyline class="path" id="path" points=""></polyline>
        <line class="live" id="live" x1="0" y1="0" x2="0" y2="0"></line>
      </svg>
    </section>

    <section class="status" aria-live="polite">
      <div class="sequence">Pattern: <span id="sequence">none</span></div>
      <div class="result" id="result">Draw the glyph.</div>
    </section>
  </main>

  <script>
    const grid = document.getElementById("grid");
    const path = document.getElementById("path");
    const live = document.getElementById("live");
    const sequenceEl = document.getElementById("sequence");
    const resultEl = document.getElementById("result");
    const clearBtn = document.getElementById("clear");
    const flameEdges = new Set(["5-7", "2-7", "2-9", "5-9"]);
    const nodes = [
      { id: 1, x: 18, y: 18 }, { id: 2, x: 50, y: 18 }, { id: 3, x: 82, y: 18 },
      { id: 4, x: 18, y: 50 }, { id: 5, x: 50, y: 50 }, { id: 6, x: 82, y: 50 },
      { id: 7, x: 18, y: 82 }, { id: 8, x: 50, y: 82 }, { id: 9, x: 82, y: 82 }
    ];

    let drawing = false;
    let sequence = [];
    let pointer = { x: 0, y: 0 };

    function nodePoint(node) {
      return { x: node.x * 3, y: node.y * 3 };
    }

    function renderDots() {
      nodes.forEach((node) => {
        const dot = document.createElement("div");
        dot.className = "dot";
        dot.dataset.id = node.id;
        dot.style.left = node.x + "%";
        dot.style.top = node.y + "%";
        dot.textContent = node.id;
        grid.appendChild(dot);
      });
    }

    function nearestNode(clientX, clientY) {
      const rect = grid.getBoundingClientRect();
      const x = ((clientX - rect.left) / rect.width) * 100;
      const y = ((clientY - rect.top) / rect.height) * 100;
      pointer = { x: x * 3, y: y * 3 };

      return nodes.find((node) => {
        const dx = node.x - x;
        const dy = node.y - y;
        return Math.sqrt(dx * dx + dy * dy) < 9;
      });
    }

    function addNode(node) {
      const last = sequence[sequence.length - 1];
      if (last === node.id) return;
      sequence.push(node.id);
      document.querySelector(`[data-id="${node.id}"]`).classList.add("active");
      updatePath();
    }

    function edgeKey(a, b) {
      return [a, b].sort((left, right) => left - right).join("-");
    }

    function countFlameLoops(pattern) {
      if (pattern.length < 5) return false;

      const uniqueNodes = new Set(pattern);
      if (![...uniqueNodes].every((id) => [2, 5, 7, 9].includes(id))) return 0;

      let drawnEdges = new Set();
      const edgeCounts = new Map([...flameEdges].map((edge) => [edge, 0]));

      for (let index = 0; index < pattern.length - 1; index++) {
        const edge = edgeKey(pattern[index], pattern[index + 1]);
        if (!flameEdges.has(edge)) return 0;
        drawnEdges.add(edge);
        edgeCounts.set(edge, edgeCounts.get(edge) + 1);
      }

      if (![...flameEdges].every((edge) => drawnEdges.has(edge))) return 0;
      return Math.min(...edgeCounts.values());
    }

    function updatePath() {
      const points = sequence
        .map((id) => nodePoint(nodes.find((node) => node.id === id)))
        .map((point) => `${point.x},${point.y}`)
        .join(" ");
      path.setAttribute("points", points);
      sequenceEl.textContent = sequence.length ? sequence.join("-") : "none";

      const last = sequence[sequence.length - 1];
      if (drawing && last) {
        const point = nodePoint(nodes.find((node) => node.id === last));
        live.setAttribute("x1", point.x);
        live.setAttribute("y1", point.y);
        live.setAttribute("x2", pointer.x);
        live.setAttribute("y2", pointer.y);
        live.style.opacity = "1";
      } else {
        live.style.opacity = "0";
      }
    }

    function finishPattern() {
      drawing = false;
      updatePath();
      const pattern = sequence.join("-");
      resultEl.className = "result";

      if (!sequence.length) {
        resultEl.textContent = "Draw the glyph.";
      } else {
        const loopCount = countFlameLoops(sequence);
        if (loopCount > 0) {
          resultEl.textContent = "Flame cast! x" + loopCount;
          resultEl.classList.add("success");
        } else {
          resultEl.textContent = "Miscast.";
          resultEl.classList.add("fail");
        }
      }
    }

    function clearPattern() {
      drawing = false;
      sequence = [];
      document.querySelectorAll(".dot").forEach((dot) => dot.classList.remove("active"));
      resultEl.className = "result";
      resultEl.textContent = "Draw the glyph.";
      updatePath();
    }

    grid.addEventListener("pointerdown", (event) => {
      clearPattern();
      drawing = true;
      grid.setPointerCapture(event.pointerId);
      const node = nearestNode(event.clientX, event.clientY);
      if (node) addNode(node);
      updatePath();
    });

    grid.addEventListener("pointermove", (event) => {
      if (!drawing) return;
      const node = nearestNode(event.clientX, event.clientY);
      if (node) addNode(node);
      updatePath();
    });

    grid.addEventListener("pointerup", finishPattern);
    grid.addEventListener("pointercancel", finishPattern);
    clearBtn.addEventListener("click", clearPattern);

    renderDots();
    clearPattern();
  </script>
</body>
</html>
