<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arcane Clash Seal Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #100f0d;
      --panel: #1b1712;
      --panel-2: #241b15;
      --line: #4f4234;
      --text: #fff7e6;
      --muted: #d8c59e;
      --hot: #ff6a2a;
      --frost: #79d7ff;
      --storm: #ffd25f;
      --earth: #88d071;
      --void: #c68cff;
      --bad: #ff3b4f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #2a1d16 0, var(--bg) 46rem);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 14px;
    }

    button, input {
      font: inherit;
    }

    .app {
      width: min(660px, 100%);
      background: color-mix(in srgb, var(--panel) 96%, black);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.18rem, 4vw, 1.55rem);
      line-height: 1.1;
    }

    .sub {
      color: var(--muted);
      font-size: 0.92rem;
      margin: 4px 0 0;
    }

    .btn {
      border: 1px solid #75644e;
      background: #15120e;
      color: var(--text);
      border-radius: 8px;
      min-height: 42px;
      padding: 0 14px;
      cursor: pointer;
    }

    .btn.primary {
      background: #ff6a2a;
      border-color: #ffc15f;
      color: #1a0d06;
      font-weight: 800;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .lobby, .game {
      display: none;
    }

    .scene-on {
      display: block;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    input {
      flex: 1 1 150px;
      min-width: 0;
      background: #12100d;
      color: var(--text);
      border: 1px solid #5b4b39;
      border-radius: 8px;
      min-height: 42px;
      padding: 0 12px;
      text-transform: uppercase;
    }

    .note {
      border: 1px solid var(--line);
      background: #12100d;
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.35;
      margin-top: 10px;
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 10px 0;
    }

    .fighter {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #12100d;
    }

    .fighter b {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.92rem;
      margin-bottom: 7px;
    }

    .bar {
      height: 12px;
      border-radius: 999px;
      background: #352820;
      overflow: hidden;
      border: 1px solid #4d3b2f;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #73d17c, #ffd25f, #ff5f45);
      transition: width 220ms ease;
    }

    .seal {
      position: relative;
      width: min(92vw, 520px);
      aspect-ratio: 1;
      margin: 10px auto 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        radial-gradient(circle at center, rgba(255, 106, 42, 0.12), transparent 42%),
        #15120f;
      touch-action: none;
      user-select: none;
      overflow: hidden;
    }

    .seal-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .ring {
      fill: none;
      stroke: rgba(121, 215, 255, 0.42);
      stroke-width: 2;
      stroke-dasharray: 8 9;
    }

    .ring.inner {
      stroke: rgba(255, 210, 95, 0.36);
      stroke-dasharray: 5 8;
    }

    .draw-line {
      stroke: var(--hot);
      stroke-width: 14;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 12px currentColor);
    }

    .draw-line.live {
      opacity: 0.72;
      stroke-width: 9;
    }

    .draw-line.fail {
      stroke: var(--bad);
      animation: failPulse 420ms ease both;
    }

    .draw-line.success {
      animation: castPulse 560ms ease both;
    }

    @keyframes castPulse {
      0% { stroke-width: 10; opacity: 0.72; }
      50% { stroke-width: 18; opacity: 1; }
      100% { stroke-width: 14; opacity: 1; }
    }

    @keyframes failPulse {
      0%, 100% { opacity: 1; transform: translateX(0); }
      25% { transform: translateX(-3px); }
      50% { opacity: 0.5; transform: translateX(3px); }
      75% { transform: translateX(-2px); }
    }

    .dot {
      position: absolute;
      width: 54px;
      height: 54px;
      margin: -27px 0 0 -27px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 2px solid #8c7c62;
      background: #242019;
      color: #dbcba5;
      font-weight: 850;
      font-size: 1rem;
      z-index: 2;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .dot.hit {
      color: #160c06;
      background: var(--hot);
      border-color: #ffd166;
      box-shadow: 0 0 20px currentColor;
    }

    .dot.center-zone {
      border-color: rgba(255, 210, 95, 0.7);
    }

    .dot.ring-zone {
      border-color: rgba(121, 215, 255, 0.72);
    }

    .result {
      margin-top: 10px;
      border: 1px solid var(--line);
      background: #12100d;
      border-radius: 8px;
      padding: 10px 12px;
      min-height: 74px;
    }

    .pattern {
      color: var(--muted);
      font-size: 0.88rem;
      overflow-wrap: anywhere;
    }

    .cast {
      margin-top: 5px;
      font-weight: 950;
      font-size: clamp(1.08rem, 4vw, 1.42rem);
      color: #ffd166;
      text-shadow: 0 0 13px rgba(255, 106, 42, 0.85);
    }

    .spell-list {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }

    .spell {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 6px;
      background: #12100d;
      min-height: 46px;
      display: grid;
      align-content: center;
      gap: 2px;
    }

    .spell b {
      font-size: 0.8rem;
    }

    .spell span {
      color: var(--muted);
      font-size: 0.72rem;
    }

    .match-over .seal {
      opacity: 0.58;
      pointer-events: none;
    }

    @media (max-width: 560px) {
      body { padding: 8px; }
      .app { padding: 10px; }
      .hud { grid-template-columns: 1fr; }
      .dot {
        width: 46px;
        height: 46px;
        margin: -23px 0 0 -23px;
      }
      .draw-line { stroke-width: 11; }
      .spell-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="lobby" class="lobby scene-on">
      <div class="top">
        <div>
          <h1>Arcane Clash</h1>
          <p class="sub">Fixed seal duel prototype</p>
        </div>
      </div>
      <div class="row">
        <input id="roomInput" maxlength="8" value="ARCANE" aria-label="Room code" />
        <button class="btn primary" id="hostBtn">Player 1</button>
        <button class="btn" id="joinBtn">Player 2</button>
      </div>
      <div class="note" id="lobbyCount">Players: 0/2 in room - Online: 0</div>
      <div class="note" id="duelLog">Ready.</div>
    </section>

    <section id="game" class="game">
      <div class="top">
        <div>
          <h1>Magic Seal Duel</h1>
          <p class="sub"><span id="roomBadge">ARCANE</span> · <span id="roleBadge">Player</span></p>
        </div>
        <button class="btn" id="leaveBtn">Lobby</button>
      </div>

      <div class="hud">
        <div class="fighter">
          <b><span>You</span><span id="youHpText">100</span></b>
          <div class="bar"><span id="youHpBar"></span></div>
        </div>
        <div class="fighter">
          <b><span>Rival</span><span id="rivalHpText">100</span></b>
          <div class="bar"><span id="rivalHpBar"></span></div>
        </div>
      </div>

      <div class="note" id="matchLog">Draw a spell shape.</div>

      <section class="seal" id="seal" aria-label="spell drawing seal">
        <svg class="seal-svg" viewBox="0 0 100 100" aria-hidden="true">
          <circle class="ring" cx="50" cy="50" r="38"></circle>
          <circle class="ring inner" cx="50" cy="50" r="19"></circle>
          <g id="pathLayer"></g>
        </svg>
      </section>

      <div class="result">
        <div class="pattern" id="patternText">Pattern: none</div>
        <div class="cast" id="resultText">Ready.</div>
      </div>

      <div class="spell-list" aria-label="Known spells">
        <div class="spell"><b>Flame</b><span>7-2-9-5-7</span></div>
        <div class="spell"><b>Frost</b><span>2-4-8-6-2</span></div>
        <div class="spell"><b>Storm</b><span>9-8-7-4-1-2-3-6-5</span></div>
        <div class="spell"><b>Water</b><span>6-8-4-7-5-9-6</span></div>
        <div class="spell"><b>Lightning</b><span>2-4-5-6-8</span></div>
        <div class="spell"><b>Earth</b><span>7-8-9-6-3</span></div>
        <div class="spell"><b>Void</b><span>1-5-9-5-3</span></div>
      </div>

      <div class="row">
        <button class="btn" id="clearBtn">Clear</button>
      </div>
    </section>
  </main>

  <script>
    const lobby = document.getElementById("lobby");
    const game = document.getElementById("game");
    const roomInput = document.getElementById("roomInput");
    const hostBtn = document.getElementById("hostBtn");
    const joinBtn = document.getElementById("joinBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const clearBtn = document.getElementById("clearBtn");
    const lobbyCount = document.getElementById("lobbyCount");
    const duelLog = document.getElementById("duelLog");
    const matchLog = document.getElementById("matchLog");
    const roomBadge = document.getElementById("roomBadge");
    const roleBadge = document.getElementById("roleBadge");
    const youHpText = document.getElementById("youHpText");
    const rivalHpText = document.getElementById("rivalHpText");
    const youHpBar = document.getElementById("youHpBar");
    const rivalHpBar = document.getElementById("rivalHpBar");
    const seal = document.getElementById("seal");
    const pathLayer = document.getElementById("pathLayer");
    const patternText = document.getElementById("patternText");
    const resultText = document.getElementById("resultText");

    const positions = {
      1: [22, 22], 2: [50, 22], 3: [78, 22],
      4: [22, 50], 5: [50, 50], 6: [78, 50],
      7: [22, 78], 8: [50, 78], 9: [78, 78],
    };

    const spells = [
      {
        id: "flame1",
        name: "Flame",
        level: 1,
        color: "#ff6a2a",
        sequence: [7, 2, 9, 5, 7],
        counts: [1, 0, 0, 0],
      },
      {
        id: "flame2",
        name: "Flame",
        level: 2,
        color: "#ff6a2a",
        sequence: [7, 5, 3, 5, 9, 8, 7],
        counts: [1, 1, 0, 0],
      },
      {
        id: "flame3",
        name: "Flame",
        level: 3,
        color: "#ff6a2a",
        sequence: [7, 5, 3, 5, 9, 8, 7, 4, 5],
        counts: [1, 1, 1, 0],
      },
      {
        id: "frost1",
        name: "Frost",
        level: 1,
        color: "#79d7ff",
        sequence: [2, 4, 8, 6, 2],
        counts: [1, 0, 0, 0],
      },
      {
        id: "storm1",
        name: "Storm",
        level: 1,
        color: "#ffd25f",
        sequence: [9, 8, 7, 4, 1, 2, 3, 6, 5],
        counts: [1, 0, 0, 0],
      },
      {
        id: "water1",
        name: "Water",
        level: 1,
        color: "#4fb7ff",
        sequence: [6, 8, 4, 7, 5, 9, 6],
        counts: [1, 0, 0, 0],
      },
      {
        id: "lightning1",
        name: "Lightning",
        level: 1,
        color: "#f6ff5b",
        sequence: [2, 4, 5, 6, 8],
        counts: [1, 0, 0, 0],
      },
      {
        id: "earth1",
        name: "Earth",
        level: 1,
        color: "#88d071",
        sequence: [7, 8, 9, 6, 3],
        counts: [1, 0, 0, 0],
      },
      {
        id: "void1",
        name: "Void",
        level: 1,
        color: "#c68cff",
        sequence: [1, 5, 9, 5, 3],
        counts: [1, 0, 0, 0],
      },
    ].map((spell) => ({ ...spell, edges: edgeBag(spell.sequence) }));

    const damageValues = [10, 18, 30, 45];
    let sequence = [];
    let drawing = false;
    let livePoint = null;
    let lastHit = null;
    let lastColor = "#ff6a2a";
    let lastResult = null;
    let duel = {
      room: "",
      player: "",
      poll: null,
      lastEvent: 0,
      lastCast: "",
      matchOver: false,
    };

    function edgeKey(a, b) {
      return a < b ? `${a}-${b}` : `${b}-${a}`;
    }

    function edgeBag(seq) {
      const bag = {};
      for (let i = 1; i < seq.length; i += 1) {
        const a = seq[i - 1];
        const b = seq[i];
        if (a === b) continue;
        const key = edgeKey(a, b);
        bag[key] = (bag[key] || 0) + 1;
      }
      return bag;
    }

    function bagEqualsMultiple(source, target, multiple) {
      const keys = new Set([...Object.keys(source), ...Object.keys(target)]);
      for (const key of keys) {
        if ((source[key] || 0) !== (target[key] || 0) * multiple) return false;
      }
      return true;
    }

    function scorePattern(seq) {
      const source = edgeBag(seq);
      const sourceEdges = Object.values(source).reduce((sum, value) => sum + value, 0);
      if (!sourceEdges) return null;

      const matches = [];
      for (const spell of spells) {
        const spellEdges = Object.values(spell.edges).reduce((sum, value) => sum + value, 0);
        if (!spellEdges || sourceEdges % spellEdges) continue;
        const loops = sourceEdges / spellEdges;
        if (bagEqualsMultiple(source, spell.edges, loops)) {
          matches.push({ spell, loops });
        }
      }

      matches.sort((a, b) => {
        if (b.spell.level !== a.spell.level) return b.spell.level - a.spell.level;
        return b.spell.sequence.length - a.spell.sequence.length;
      });
      return matches[0] || null;
    }

    function totalDamage(counts, loops) {
      return counts.reduce((sum, count, index) => sum + count * loops * damageValues[index], 0);
    }

    function makeDots() {
      Object.entries(positions).forEach(([id, pos]) => {
        const dot = document.createElement("div");
        dot.className = "dot";
        dot.dataset.id = id;
        dot.textContent = id;
        dot.style.left = `${pos[0]}%`;
        dot.style.top = `${pos[1]}%`;
        const dx = pos[0] - 50;
        const dy = pos[1] - 50;
        const distance = Math.hypot(dx, dy);
        dot.classList.add(distance < 5 ? "center-zone" : "ring-zone");
        seal.appendChild(dot);
      });
    }

    function api(path, payload) {
      const options = payload
        ? { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }
        : {};
      return fetch(path, options).then((response) => {
        if (!response.ok) throw new Error("Server unavailable");
        return response.json();
      });
    }

    function showLobby(message) {
      lobby.classList.add("scene-on");
      game.classList.remove("scene-on");
      game.classList.remove("match-over");
      if (duel.poll) clearInterval(duel.poll);
      duel.poll = null;
      duel.room = "";
      duel.player = "";
      duel.lastEvent = 0;
      duel.lastCast = "";
      duel.matchOver = false;
      duelLog.textContent = message || "Ready.";
      clearPattern();
    }

    function showGame() {
      lobby.classList.remove("scene-on");
      game.classList.add("scene-on");
    }

    function roomCode() {
      return (roomInput.value || "ARCANE").toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 8) || "ARCANE";
    }

    function setHealth(elText, elBar, value) {
      const hp = Math.max(0, Math.min(100, Number(value) || 0));
      elText.textContent = `${hp}`;
      elBar.style.width = `${hp}%`;
    }

    function updateState(state) {
      setHealth(youHpText, youHpBar, state.you.hp);
      setHealth(rivalHpText, rivalHpBar, state.rival.hp);
      lobbyCount.textContent = `Players: ${state.roomUsers || 0}/2 in room - Online: ${state.serverUsers || 0}`;
      if (state.winner) {
        duel.matchOver = true;
        game.classList.add("match-over");
        if (duel.poll) clearInterval(duel.poll);
        duel.poll = null;
        const won = state.winner === duel.player;
        resultText.textContent = won ? "Victory." : "Defeat.";
        matchLog.textContent = won ? "Match won." : "Match lost.";
      } else if ((state.roomUsers || 0) < 2) {
        matchLog.textContent = `Room ${state.room} ready. Waiting for rival.`;
      } else if (state.events.length && state.events[state.events.length - 1].id !== duel.lastEvent) {
        const event = state.events[state.events.length - 1];
        duel.lastEvent = event.id;
        const source = event.player === duel.player ? "You" : "Rival";
        matchLog.textContent = `${source} cast ${event.spell} for ${event.damage} damage.`;
      } else {
        matchLog.textContent = `Room ${state.room} live. Draw a spell.`;
      }
    }

    async function connectDuel(role) {
      try {
        duelLog.textContent = "Contacting online server...";
        const joined = await api("/api/join", { room: roomCode(), role, reset: role === "host" });
        duel.room = joined.room;
        duel.player = joined.player;
        duel.lastEvent = 0;
        duel.lastCast = "";
        duel.matchOver = false;
        roomBadge.textContent = duel.room;
        roleBadge.textContent = duel.player === "p1" ? "Player 1" : "Player 2";
        showGame();
        updateState(joined);
        if (duel.poll) clearInterval(duel.poll);
        duel.poll = setInterval(pollDuel, 900);
      } catch (error) {
        duelLog.textContent = "Online server not running. Try again after the host wakes up.";
        lobbyCount.textContent = "Players: 0/2 in room - Online: 0";
      }
    }

    async function pollDuel() {
      if (!duel.room || !duel.player) return;
      try {
        const state = await api(`/api/state?room=${encodeURIComponent(duel.room)}&player=${encodeURIComponent(duel.player)}`);
        updateState(state);
      } catch (error) {
        matchLog.textContent = "Online server not running. Try again after the host wakes up.";
      }
    }

    async function sendOnlineCast(match) {
      if (!duel.room || !duel.player || duel.matchOver) return;
      const counts = match.spell.counts.map((count) => count * match.loops);
      const signature = `${duel.room}:${duel.player}:${match.spell.id}:${sequence.join("-")}:${counts.join(",")}`;
      if (signature === duel.lastCast) return;
      duel.lastCast = signature;
      try {
        const state = await api("/api/cast", {
          room: duel.room,
          player: duel.player,
          spell: `${match.spell.name} LV${match.spell.level}`,
          counts,
        });
        updateState(state);
      } catch (error) {
        matchLog.textContent = "Cast stayed local. Online server not running.";
      }
    }

    function nearestDot(clientX, clientY) {
      const rect = seal.getBoundingClientRect();
      const x = ((clientX - rect.left) / rect.width) * 100;
      const y = ((clientY - rect.top) / rect.height) * 100;
      livePoint = [x, y];
      let closest = null;
      let closestDistance = Infinity;
      for (const [id, pos] of Object.entries(positions)) {
        const dx = x - pos[0];
        const dy = y - pos[1];
        const distance = Math.hypot(dx, dy);
        if (distance < closestDistance) {
          closest = Number(id);
          closestDistance = distance;
        }
      }
      return closestDistance <= 9 ? closest : null;
    }

    function markDot(id) {
      const dot = seal.querySelector(`.dot[data-id="${id}"]`);
      if (dot) dot.classList.add("hit");
    }

    function appendDot(id) {
      if (!id || id === lastHit) return;
      sequence.push(id);
      lastHit = id;
      markDot(id);
      renderPath();
    }

    function line(from, to, className, color) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", "line");
      el.setAttribute("x1", from[0]);
      el.setAttribute("y1", from[1]);
      el.setAttribute("x2", to[0]);
      el.setAttribute("y2", to[1]);
      el.setAttribute("class", className);
      el.style.stroke = color;
      return el;
    }

    function renderPath(stateClass = "") {
      pathLayer.innerHTML = "";
      const color = lastResult ? lastResult.spell.color : lastColor;
      for (let i = 1; i < sequence.length; i += 1) {
        const from = positions[sequence[i - 1]];
        const to = positions[sequence[i]];
        if (from && to) pathLayer.appendChild(line(from, to, `draw-line ${stateClass}`, color));
      }
      if (drawing && sequence.length && livePoint) {
        const from = positions[sequence[sequence.length - 1]];
        pathLayer.appendChild(line(from, livePoint, "draw-line live", color));
      }
      patternText.textContent = `Pattern: ${sequence.length ? sequence.join("-") : "none"}`;
    }

    function clearPattern() {
      sequence = [];
      drawing = false;
      livePoint = null;
      lastHit = null;
      lastResult = null;
      pathLayer.innerHTML = "";
      seal.querySelectorAll(".dot").forEach((dot) => dot.classList.remove("hit"));
      patternText.textContent = "Pattern: none";
      resultText.textContent = duel.matchOver ? resultText.textContent : "Ready.";
    }

    function finishPattern() {
      if (!drawing || duel.matchOver) return;
      drawing = false;
      livePoint = null;
      lastHit = null;
      const match = scorePattern(sequence);
      if (match) {
        lastResult = match;
        lastColor = match.spell.color;
        const damage = totalDamage(match.spell.counts, match.loops);
        const loopText = match.loops > 1 ? ` x${match.loops}` : "";
        resultText.textContent = `${match.spell.name} LV${match.spell.level} cast${loopText}. ${damage} damage.`;
        renderPath("success");
        sendOnlineCast(match);
      } else if (sequence.length > 1) {
        resultText.textContent = "Miscast.";
        renderPath("fail");
      } else {
        clearPattern();
      }
    }

    seal.addEventListener("pointerdown", (event) => {
      if (duel.matchOver) return;
      clearPattern();
      drawing = true;
      seal.setPointerCapture(event.pointerId);
      appendDot(nearestDot(event.clientX, event.clientY));
      renderPath();
    });

    seal.addEventListener("pointermove", (event) => {
      if (!drawing || duel.matchOver) return;
      appendDot(nearestDot(event.clientX, event.clientY));
      renderPath();
    });

    seal.addEventListener("pointerup", finishPattern);
    seal.addEventListener("pointercancel", finishPattern);
    clearBtn.addEventListener("click", clearPattern);
    hostBtn.addEventListener("click", () => connectDuel("host"));
    joinBtn.addEventListener("click", () => connectDuel("join"));
    leaveBtn.addEventListener("click", () => showLobby("Choose a room for the next duel."));

    makeDots();
    clearPattern();
  </script>
</body>
</html>
